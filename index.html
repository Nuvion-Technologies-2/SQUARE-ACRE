<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUARE & ACRE | COMING SOON</title>
<link rel="icon" type="image/png" href="TOWER.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-teal: #142828;
            --brand-gold: #c5a082;
        }

        body {
            background-color: var(--brand-teal);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Image Containers for precise scaling */
        .img-tower {
            width: clamp(100px, 15vw, 180px);
            height: auto;
            margin-bottom: 2.5rem;
        }

        .img-brand-name {
            width: clamp(280px, 50vw, 600px);
            height: auto;
            margin-bottom: 1rem;
        }

        .img-realty {
            width: clamp(120px, 20vw, 240px);
            height: auto;
            opacity: 0.9;
        }

        /* Refined Coming Soon Text */
        .coming-soon {
            margin-top: 5rem;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 1.5em;
            text-indent: 1.5em;
            color: var(--brand-gold);
            font-size: clamp(0.65rem, 1.5vw, 0.85rem);
            border-top: 1px solid rgba(197, 160, 130, 0.3);
            padding-top: 2rem;
        }

        /* Animations */
        @keyframes reveal {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate {
            animation: reveal 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Grain for that expensive texture */
        .grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <main class="flex flex-col items-center text-center px-10">
        
        <!-- 1. THE TOWER IMAGE -->
        <div class="animate">
            <img src="TOWER.png" alt="Square & Acre Tower" class="img-tower" onerror="this.style.display='none'">
            <!-- Fallback if image isn't loaded -->
        </div>

        <!-- 2. THE BRAND NAME IMAGE (SQUARE & ACRE) -->
        <div class="animate delay-1">
            <img src="MAIN_TEXT.png" alt="SQUARE & ACRE" class="img-brand-name">
        </div>

        <!-- 3. THE REALTY IMAGE -->
        <div class="animate delay-2">
            <img src="SUB_TEXT.png" alt="REALTY" class="img-realty">
        </div>

        <!-- 4. COMING SOON (Styled Text for contrast) -->
        <div class="coming-soon animate delay-3">
            Coming Soon
        </div>

    </main>

    <!-- Est. Marker -->
    <footer class="fixed bottom-10 animate delay-3 opacity-20">
        <p class="text-[9px] uppercase tracking-[0.6em]">Est. 2024</p>
    </footer>

</body>
</html>
